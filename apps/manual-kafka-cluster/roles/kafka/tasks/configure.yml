---
# configure kafka 

- name: 'subset of {{ region_name }} servers'
  set_fact:
    cluster_servers: '{{ (kafka_data.server | selectattr("instance.region", "eq", region_name))[0:3]
                         | map(attribute="instance.hostname") }}'
  run_once: true
  delegate_to: localhost

- name: '{{ region_name }} servers and voters'
  set_fact:
    region_bootstrap_servers: '{{ cluster_servers | zip_longest([], fillvalue=":9092") | map("join") | join(", ") }}'
    quorum_voters: '{{ query("sequence", "", start=1, count=3, format="%d@")
                       | zip_longest(cluster_servers, [], fillvalue=":9093")
                       | map("join")
                       | join(", ") }}'
  run_once: true
  delegate_to: localhost

- name: updating kafka config for controllers and brokers
  template:
    src: templates/{{ server_properties | basename }}.j2
    dest: "{{ server_properties }}"
    owner: kafka
    group: kafka
    mode: 0644
    backup: true
    force: true
  vars:
    node_id: '{{ (groups[region_name] | ansible.utils.index_of("eq", inventory_hostname)) + 1 }}'
    listener: '{{ hostname_map[inventory_hostname].instance.hostname }}'
    server_properties: "{{ kafka_config_directory }}/{{ role_properties[hostvars[inventory_hostname].role] }}"
  when:
    - hostvars[inventory_hostname].region == region_name

# mirror-maker for servers that are controller and broker roles
- name: updating kafka mirror maker config for controller and broker
  template:
    src: templates/connect-mirror-maker.properties.j2
    dest: "{{ kafka_config_directory }}/connect-mirror-maker.properties"
    owner: kafka
    group: kafka
    mode: 0644
    backup: true
    force: true
  vars:
    listener: '{{ hostname_map[inventory_hostname].instance.hostname }}'
  when:
    - hostvars[inventory_hostname].region == region_name
    - hostvars[inventory_hostname].role == 'controller and broker'

- name: check existing kafka cluster uuid
  shell:
    cmd: grep -s cluster.id {{ kafka_data_directory }}/data/kraft-combined-logs/meta.properties | cut -f 2 -d = || /bin/true
    removes: "{{ kafka_data_directory}}/data/kraft-combined-logs/meta.properties"
  register: old_cluster_uuid
  run_once: true
  delegate_to: "{{ groups[region_name][0] }}"

- name: create kafka cluster uuid
  command:
    cmd:  "{{ kafka_bin_directory }}/kafka-storage.sh random-uuid"
    creates: "{{ kafka_data_directory}}/data/kraft-combined-logs/meta.properties"
  register: new_cluster_uuid
  run_once: true
  delegate_to: "{{ groups[region_name][0] }}"

- name: determine kafka cluster uuid
  set_fact:
    cluster_uuid: "{{ (old_cluster_uuid.changed) | ternary(old_cluster_uuid.stdout, new_cluster_uuid.stdout) }}"
  run_once: true
  delegate_to: localhost

- name: format data directory for controllers and brokers
  command:
    cmd: "{{ kafka_bin_directory }}/kafka-storage.sh format -t {{ cluster_uuid}} -c {{ server_properties }} --ignore-formatted"
  become: true
  become_user: kafka
  vars:
    server_properties: "{{ kafka_config_directory }}/{{ role_properties[hostvars[inventory_hostname].role] }}"
  when:
    - hostvars[inventory_hostname].region == region_name
