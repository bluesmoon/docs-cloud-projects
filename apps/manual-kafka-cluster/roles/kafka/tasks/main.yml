---
# main

- name: map inventory hosts to group vars
  set_fact:
    hostname_map: '{{ dict(groups["kafka"] | zip(kafka_data.server) ) }}'
  run_once: true
  delegate_to: localhost

- name: configure hostname
  import_tasks: hostname.yml

- name: create kafka user
  import_tasks: user.yml

- name: installing kafka
  import_tasks: install.yml
  tags:
    - install

- name: configure cluster certs
  import_tasks: ssl.yml
  tags:
    - certs

- name: configure kafka
  include_tasks: configure.yml
  loop: '{{ [region] | flatten }}'
  loop_control:
    loop_var: region_name
  when: hostvars[inventory_hostname].region == region_name
  tags:
    - configure_kafka

- name: configure mirror-maker
  include_tasks: mirror-maker.yml
  loop: '{{ [region] | flatten }}'
  loop_control:
    loop_var: region_name
  when: hostvars[inventory_hostname].region == region_name
  tags:
    - configure_mirror_maker

- name: setup application log cleanup
  include_tasks: logrotate.yml

- name: starting kafka
  systemd:
    name: kafka
    state: started
    enabled: true
    daemon_reload: true

- name: starting mirror-maker
  systemd:
    name: mirror-maker
    state: restarted
    enabled: true
    daemon_reload: true
  when:
    - '"controller" in hostvars[inventory_hostname].role'
