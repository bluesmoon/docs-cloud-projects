---
# install kafka in cluster

- name: create kafka config directory
  file:
    path: "{{ kafka_install_directory }}"
    state: directory
    mode: 0755
    owner: kafka
    group: kafka

- name: download kafka {{ kafka_version }}
  get_url: 
    url: "https://downloads.apache.org/kafka/{{ kafka_version }}/kafka_2.13-{{ kafka_version }}.tgz"
    checksum: "{{ kafka_checksum }}"
    dest: "/tmp/kafka_2.13-{{ kafka_version }}.tgz"
    owner: kafka
    group: kafka
    mode: 0644

- name: untar kafka archive
  unarchive:
    src: "/tmp/kafka_2.13-{{ kafka_version }}.tgz"
    dest: "{{ kafka_install_directory }}"
    extra_opts: [--strip-components=1]
    remote_src: true

- name: updating config directory ownership
  ansible.builtin.file:
    path: "{{ kafka_install_directory }}"
    state: directory
    recurse: yes
    owner: kafka
    group: kafka

- name: add kafka systemd service file
  template:
    src: templates/kafka.service.j2
    dest: /lib/systemd/system/kafka.service
  vars:
    myrole: "{{ hostvars[inventory_hostname].role }}"
    server_properties: "{{ kafka_config_directory }}/kraft/server.properties"

- name: add kafka mirror-maker systemd service file for broker and controller
  ansible.builtin.template:
    src: templates/mirror-maker.service.j2
    dest: "/usr/lib/systemd/system/mirror-maker.service"

- name: create kafka data and log directory
  file:
    path: "{{ kafka_log_directory }}"
    state: directory
    mode: 0755
    owner: kafka
    group: kafka

# client-properties for all servers for admin tasks
- name: updating kafka client properties
  template:
    src: templates/client.properties.j2
    dest: "{{ kafka_config_directory }}/client.properties"
    owner: kafka
    group: kafka
    mode: 0644
    backup: true
    force: true
